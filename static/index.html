<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>智能OnCall助手</title>
    <link rel="stylesheet" href="/static/styles.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <!-- 历史记录抽屉遮罩 -->
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- 历史记录抽屉（从左侧滑出） -->
    <div class="history-drawer" id="historyDrawer">
        <div class="drawer-header">
            <div class="drawer-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 4v16M6 10h12M12 10L5.5 18M12 10L18.5 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>历史对话</span>
            </div>
            <div class="drawer-header-actions">
                <button class="drawer-new-chat-btn" id="newChatBtn" title="新建对话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="drawer-close-btn" id="drawerCloseBtn" title="关闭">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="drawer-content" id="drawerContent">
            <div class="history-list" id="chatHistoryList">
                <!-- 历史对话动态渲染 -->
            </div>
        </div>
    </div>

    <!-- 顶部栏 -->
    <header class="app-header">
        <div class="header-left">
            <button class="header-icon-btn" id="historyToggleBtn" title="历史对话">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="header-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 4v16M6 10h12M12 10L5.5 18M12 10L18.5 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="header-title">OnCall 助手</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-mode-group">
                <button class="mode-tab" id="modeQuick" data-mode="quick">快速回答</button>
                <button class="mode-tab" id="modeStream" data-mode="stream">流式对话</button>
            </div>
            <button class="header-btn" id="aiOpsHeaderBtn" title="AIOps 智能运维">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                AI Ops
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="app-main">
        <div class="chat-container" id="chatContainer">
            <!-- 欢迎 / 消息列表 -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.2"/>
                            <path d="M12 4v16M6 10h12M12 10L5.5 18M12 10L18.5 18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">有什么我可以帮助你的？</h1>
                    <p class="welcome-subtitle">支持知识库问答、AIOps 智能运维诊断</p>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area">
                <div class="input-container" id="inputContainer">
                    <textarea class="message-input" id="messageInput" placeholder="输入你的问题..." rows="1" maxlength="1000"></textarea>
                    <div class="input-actions">
                        <button class="input-action-btn" id="uploadBtn" title="上传文件">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <button class="send-btn" id="sendButton" title="发送">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".txt,.md,.markdown" hidden>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">处理中，请稍候...</div>
        </div>
    </div>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
